<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход на сайт</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #2b2b2b;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 274px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: #444;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        .input-main { width: 100%; }
        .main-btn {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background-color: white;
            color: black;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
        }
        .main-btn:hover { background-color: #a8f5a8; }
        .eye-btn {
            padding: 11px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #333;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eye-btn:hover { background-color: #444; }
        .app-link, .app-link:visited, .app-link:active, .app-link:focus {
            color: #888888 !important;
            text-decoration: none !important;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .app-link:hover { color: #3b82f6 !important; }
        .error-msg {
            color: #ff4a4a;
            font-size: 14px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Вход на сайт</h2>
        <input type="text" id="username" class="input-main" placeholder="Введи логин">
        <div style="display: flex; width: 100%; gap: 5px;">
            <input type="password" id="password" style="flex-grow: 1; min-width: 0;" placeholder="Введи пароль">
            <button id="togglePassword" type="button" class="eye-btn">👁️</button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button onclick="sendLogin()" class="main-btn">Войти на сайт</button>
        <a href="/register-page" class="app-link">Нет аккаунта? Зарегистрироваться</a>
    </div>

    <script>
        // Глазик
        document.getElementById('togglePassword').addEventListener('click', function () {
            const p = document.getElementById('password');
            if (p.type === 'password') { p.type = 'text'; this.textContent = '🙈'; }
            else { p.type = 'password'; this.textContent = '👁️'; }
        });

        // Enter для отправки
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendLogin();
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function sendLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if (!u || !p) { showError("Заполните все поля!"); return; }

            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (!res.ok) { showError(data.detail); return; }
            window.location.href = data.redirect;
        }
    </script>
</body>
</html>
